<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6d28d9" />
  <title>DepoZeka — Koli Bilgisi</title>
  <style>
    :root { --ink:#0b1020; --muted:#6b7280; --line:#e5e7eb; --card:#fff; --page:#f1f5f9; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; background:var(--page); color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.45; }
    .page { max-width: 880px; margin: 0 auto; padding: 16px; }
    .mono { font-family: ui-monospace,"SF Mono",Menlo,monospace; }
    [data-lucide] { stroke-width: 2; vertical-align: middle; }

    .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
      box-shadow:0 6px 24px rgba(11,16,32,.06); overflow:hidden; }

    /* ---- üst bant ---- */
    .band { color:#fff; padding:20px; display:flex; flex-direction:column; gap:16px; }
    @media(min-width:640px){ .band { flex-direction:row; align-items:center; justify-content:space-between; } }
    .band-left { display:flex; align-items:center; gap:16px; }
    .iconbox { width:56px; height:56px; border-radius:16px; background:rgba(255,255,255,.2);
      display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
    .eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:rgba(255,255,255,.72); margin:0; }
    .barkod { font-size:25px; font-weight:800; margin:2px 0; }
    .sub { font-size:14px; color:rgba(255,255,255,.85); margin:0; }
    .band-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .chip { background:rgba(255,255,255,.18); padding:6px 12px; border-radius:999px; font-size:13px;
      font-weight:600; color:#fff; display:inline-flex; align-items:center; gap:6px; }

    /* ---- içerik ---- */
    .content { display:flex; flex-direction:column; gap:24px; padding:24px; }
    @media(min-width:768px){ .content { flex-direction:row; } }
    .qrwrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
    .qrbox { border:1px solid var(--line); border-radius:10px; background:#fff; padding:16px; }
    .qrbox canvas { width:170px; height:170px; display:block; }
    .qrtitle { font-size:14px; font-weight:700; text-align:center; }
    .qrsub { font-size:12px; color:var(--muted); text-align:center; margin-top:2px; }
    .btn { border:1px solid var(--line); border-radius:8px; padding:7px 12px; font-size:13px; background:#fff;
      color:var(--ink); display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-weight:500; }
    .right { flex:1; display:flex; flex-direction:column; gap:20px; min-width:0; }
    .sec-label { display:flex; align-items:center; gap:7px; font-size:11px; text-transform:uppercase;
      letter-spacing:.07em; color:var(--muted); font-weight:700; }

    /* ---- hammadde liste ---- */
    .items { border:1px solid var(--line); border-radius:12px; overflow:hidden; }
    .item { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px;
      border-top:1px solid var(--line); }
    .item:first-child { border-top:none; }
    .item .l { display:flex; align-items:center; gap:10px; min-width:0; }
    .dot { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
    .ad { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta { display:flex; align-items:center; gap:8px; margin-top:2px; }
    .kod { font-size:12px; color:var(--muted); }
    .tag { font-size:10px; font-weight:700; color:#fff; padding:1px 8px; border-radius:999px; }
    .qty { font-size:18px; font-weight:800; text-align:right; white-space:nowrap; }
    .qty small { font-size:12px; font-weight:500; color:var(--muted); }
    .qsub { font-size:12px; color:var(--muted); text-align:right; }

    /* ---- ürün ---- */
    .title { font-size:20px; font-weight:800; margin:0; letter-spacing:-.01em; }
    .modelline { color:var(--muted); font-size:14px; margin:2px 0 0; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--line);
      border:1px solid var(--line); border-radius:12px; overflow:hidden; }
    .grid3 > div { background:#fff; padding:12px 8px; text-align:center; }
    .g-ic { display:block; margin:0 auto 4px; }
    .g-k { font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    .g-v { font-size:17px; font-weight:800; margin-top:2px; }
    .swatch { width:12px; height:12px; border-radius:50%; border:1px solid rgba(0,0,0,.15);
      display:inline-block; vertical-align:middle; margin-right:5px; }
    .compbar { display:flex; height:20px; border-radius:999px; overflow:hidden; }
    .compbar > span { display:flex; align-items:center; justify-content:center; color:#fff; font-size:10px; font-weight:700; }
    .legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:8px; }
    .legend span { font-size:12px; color:var(--muted); display:inline-flex; align-items:center; gap:6px; }
    .legend b { color:var(--ink); }
    .badges { display:flex; flex-wrap:wrap; gap:8px; }
    .badge { font-size:12px; padding:5px 10px; border-radius:999px; border:1px solid var(--line);
      display:inline-flex; align-items:center; gap:5px; color:#374151; }
    .badge.cert { border-color:#bbf7d0; color:#15803d; background:#f0fdf4; }
    .kv { display:flex; flex-wrap:wrap; gap:14px; font-size:14px; color:var(--muted); }
    .kv b { color:var(--ink); font-weight:600; }
    .note { display:flex; gap:8px; background:#f3f4f6; border-radius:8px; padding:10px 12px; font-size:13px; color:#4b5563; }

    /* ---- alt istatistik ---- */
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line); border-top:1px solid var(--line); }
    @media(min-width:640px){ .stats { grid-template-columns:repeat(4,1fr); } }
    .stats > div { background:#fff; padding:16px 10px; text-align:center; }
    .s-ic { display:block; margin:0 auto 4px; }
    .s-k { font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    .s-v { font-size:17px; font-weight:800; margin-top:3px; }

    .foot { text-align:center; color:var(--muted); font-size:12px; padding:18px 8px 4px; }
    .foot .logo { font-weight:800; color:#0e5a52; }
    .err { text-align:center; padding:60px 24px; color:var(--muted); }
    .err h2 { color:var(--ink); }
  </style>
</head>
<body>
  <div class="page"><div id="app"></div>
    <div class="foot"><span class="logo">DepoZeka</span> · Çorap Fabrikası Deposu — koli barkodu okutularak açılmıştır.</div>
  </div>

  <script src="data.js"></script>
  <script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script>
    var DEPO = window.DEPO;
    function num(n,d){ return new Intl.NumberFormat("tr-TR",{minimumFractionDigits:d||0,maximumFractionDigits:d||0}).format(n); }
    function agirlik(kg){ return kg>=1000 ? num(kg/1000,1)+" ton" : num(kg,1)+" kg"; }
    function paraTL(v){ return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(v); }
    function paraDoviz(v,d){ var s=d==="EUR"?"€":d==="USD"?"$":d; return num(v,2)+" "+s; }
    function tarih(s){ var a=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
      var p=s.split("-"); return parseInt(p[2],10)+" "+a[parseInt(p[1],10)-1]+" "+p[0]; }
    function esc(s){ return String(s==null?"":s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }
    function ic(name,size,color){ return '<i data-lucide="'+name+'" style="width:'+size+'px;height:'+size+'px'+(color?(';color:'+color):'')+'"></i>'; }

    function toplamAgirlik(k){ return k.tip==="bitmis_urun" ? k.urun.cift_sayisi*k.urun.birim_agirlik_kg
      : k.kalemler.reduce(function(s,i){return s+i.miktar*i.birim_agirlik_kg;},0); }
    function toplamDeger(k){ return k.tip==="bitmis_urun" ? k.urun.cift_sayisi*k.urun.birim_fiyat
      : k.kalemler.reduce(function(s,i){return s+i.miktar*i.birim_fiyat;},0); }
    function toplamAdet(k){ return k.tip==="bitmis_urun" ? k.urun.cift_sayisi
      : k.kalemler.reduce(function(s,i){return s+i.miktar;},0); }

    function getId(){ var p=new URLSearchParams(location.search); return p.get("id")||p.get("koli")||(location.hash?location.hash.slice(1):""); }

    function render(){
      var app=document.getElementById("app");
      var id=getId();
      var k=DEPO.kolis.filter(function(x){return x.barkod===id||x.id===id;})[0];

      if(!k){
        app.innerHTML='<div class="err"><div style="font-size:46px">📦</div><h2>Koli bulunamadı</h2>'+
          '<p>Geçerli bir koli barkodu okutun. Örnek: <code>?id=KOLI-0005</code></p></div>';
        document.title="DepoZeka — Bulunamadı"; afterRender(); return;
      }

      var isUrun=k.tip==="bitmis_urun";
      var tip=DEPO.tip[k.tip], durum=DEPO.durum[k.durum];
      var grad=isUrun ? "linear-gradient(135deg,#4c1d95 0%,#6d28d9 60%,#8b5cf6 100%)"
                      : "linear-gradient(135deg,#075985 0%,#0369a1 60%,#0ea5e9 100%)";
      document.title="DepoZeka — "+k.barkod;
      document.querySelector('meta[name="theme-color"]').setAttribute("content", isUrun?"#6d28d9":"#0369a1");

      var right="";
      if(!isUrun){
        right+='<div><div class="sec-label">'+ic("package-open",16,"#6b7280")+' Koli İçindekiler</div>'+
          '<div class="items" style="margin-top:8px">'+
          k.kalemler.map(function(it){
            var a=DEPO.aileler[it.aile]||{renk:"#6b7280",label:it.aile};
            return '<div class="item"><div class="l">'+
              '<div class="dot" style="background:'+a.renk+'1a">'+ic("package",20,a.renk)+'</div>'+
              '<div style="min-width:0"><div class="ad">'+esc(it.ad)+'</div>'+
              '<div class="meta"><span class="kod mono">'+esc(it.kod)+'</span>'+
              '<span class="tag" style="background:'+a.renk+'">'+esc(a.label)+'</span></div></div></div>'+
              '<div><div class="qty">'+num(it.miktar)+' <small>'+(DEPO.birim[it.birim]||it.birim)+'</small></div>'+
              '<div class="qsub">'+agirlik(it.miktar*it.birim_agirlik_kg)+' · '+paraTL(it.miktar*it.birim_fiyat)+'</div></div></div>';
          }).join("")+'</div></div>';
      } else {
        var u=k.urun;
        right+='<div><div class="title">'+esc(u.ad)+'</div><div class="modelline">'+esc(u.model)+' · Beden '+esc(u.beden)+'</div></div>';
        right+='<div class="grid3">'+
          '<div>'+ic("hash",16,"#4f46e5")+'<div class="g-k">Çift Sayısı</div><div class="g-v">'+num(u.cift_sayisi)+'</div></div>'+
          '<div>'+ic("palette",16,"#6366f1")+'<div class="g-k">Renk</div><div class="g-v" style="font-size:13px"><span class="swatch" style="background:'+u.renk_kodu+'"></span>'+esc(u.renk)+'</div></div>'+
          '<div>'+ic("ruler",16,"#ec4899")+'<div class="g-k">Beden</div><div class="g-v">'+esc(u.beden)+'</div></div>'+
          '</div>';
        if(u.kompozisyon&&u.kompozisyon.length){
          right+='<div><div class="sec-label">'+ic("layers",14,"#6b7280")+' Hammadde Kompozisyonu</div>'+
            '<div class="compbar" style="margin-top:8px">'+
            u.kompozisyon.map(function(c){return '<span style="width:'+c.oran+'%;background:'+c.renk+'">'+(c.oran>=10?"%"+c.oran:"")+'</span>';}).join("")+
            '</div><div class="legend">'+
            u.kompozisyon.map(function(c){return '<span><span class="swatch" style="background:'+c.renk+'"></span>'+esc(c.malzeme)+' <b>%'+c.oran+'</b></span>';}).join("")+
            '</div></div>';
        }
        var badges='<div class="badges">';
        if(u.musteri) badges+='<span class="badge">'+ic("globe",13)+' '+esc(u.musteri)+(u.ulke?" · "+esc(u.ulke):"")+'</span>';
        (u.sertifikalar||[]).forEach(function(s){ badges+='<span class="badge cert">'+ic("shield",13)+' '+esc(s)+'</span>'; });
        badges+='</div>'; right+=badges;
        if(u.siparis_no||u.lot){
          right+='<div class="kv">'+(u.siparis_no?'<span>Sipariş: <b class="mono">'+esc(u.siparis_no)+'</b></span>':'')+
            (u.lot?'<span>Lot: <b class="mono">'+esc(u.lot)+'</b></span>':'')+'</div>';
        }
      }
      if(k.notlar) right+='<div class="note">'+ic("sticky-note",16,"#9ca3af")+' '+esc(k.notlar)+'</div>';

      app.innerHTML=
        '<div class="card">'+
          '<div class="band" style="background:'+grad+'">'+
            '<div class="band-left"><div class="iconbox">'+ic(isUrun?"package":"boxes",28,"#fff")+'</div>'+
              '<div><p class="eyebrow">'+tip.label+'</p>'+
              '<p class="barkod mono">'+esc(k.barkod)+'</p>'+
              '<p class="sub">'+(isUrun?esc(k.urun.ad):k.kalemler.length+' çeşit malzeme')+'</p></div></div>'+
            '<div class="band-right">'+
              '<span class="chip" style="background:'+durum.renk+'">'+durum.label+'</span>'+
              '<span class="chip">'+ic("warehouse",14,"#fff")+' <span class="mono">'+esc(k.konum)+'</span></span>'+
            '</div>'+
          '</div>'+
          '<div class="content">'+
            '<div class="qrwrap"><div class="qrbox"><canvas id="qr"></canvas></div>'+
              '<div><div class="qrtitle mono">'+esc(k.barkod)+'</div><div class="qrsub">'+tip.label+'</div></div>'+
              '<button class="btn" id="dl">'+ic("download",14)+' PNG İndir</button></div>'+
            '<div class="right">'+right+'</div>'+
          '</div>'+
          '<div class="stats">'+
            '<div>'+ic("boxes",16,"#6b7280")+'<div class="s-k">'+(isUrun?"Çift Sayısı":"Toplam Adet")+'</div><div class="s-v">'+num(toplamAdet(k))+'</div></div>'+
            '<div>'+ic("weight",16,"#d97706")+'<div class="s-k">Toplam Ağırlık</div><div class="s-v">'+agirlik(toplamAgirlik(k))+'</div></div>'+
            '<div>'+ic("circle-dollar-sign",16,"#16a34a")+'<div class="s-k">Toplam Değer</div><div class="s-v">'+(isUrun?paraDoviz(toplamDeger(k),k.urun.doviz):paraTL(toplamDeger(k)))+'</div></div>'+
            '<div>'+ic("calendar",16,"#2563eb")+'<div class="s-k">Oluşturma</div><div class="s-v" style="font-size:14px">'+tarih(k.olusturma_tarihi)+'</div></div>'+
          '</div>'+
        '</div>';

      // QR (uygulamadaki gibi DZ:K: kodu) + PNG indir
      if(window.QRCode){
        var canvas=document.getElementById("qr");
        QRCode.toCanvas(canvas,"DZ:K:"+k.barkod,{width:340,margin:1,errorCorrectionLevel:"M"},function(e){if(e)console.error(e);});
        var dl=document.getElementById("dl");
        if(dl) dl.addEventListener("click",function(){var a=document.createElement("a");a.download=k.barkod+"-qr.png";a.href=canvas.toDataURL("image/png");a.click();});
      }
      afterRender();
    }

    function afterRender(){ if(window.lucide&&lucide.createIcons) lucide.createIcons(); }
    render();
  </script>
</body>
</html>
