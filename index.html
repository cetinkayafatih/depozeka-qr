<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DepoZeka — Koli QR Üreteci</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f6faf8; color: #0b1020;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 24px 16px 60px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .lead { color: #6b7280; font-size: 14px; margin: 0 0 20px; }
    .bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
    button, a.btn { border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn { background: #0e5a52; color: #fff; }
    .btn.alt { background: #fff; color: #0b1020; border: 1px solid #d1d5db; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .card img.qr { width: 150px; height: 150px; display: block; }
    .barkod { font-family: ui-monospace, monospace; font-weight: 800; font-size: 15px; }
    .tip { font-size: 11px; font-weight: 700; color: #fff; padding: 2px 9px; border-radius: 999px; }
    .icerik { font-size: 12px; color: #6b7280; min-height: 32px; }
    .url { font-size: 10px; color: #9ca3af; word-break: break-all; }
    .actions { display: flex; gap: 6px; }
    .actions a { font-size: 12px; padding: 6px 10px; border-radius: 8px; text-decoration: none; }
    a.open { background: #f3f4f6; color: #0b1020; }
    a.dl { background: #fff; color: #0b1020; border: 1px solid #d1d5db; }
    @media print {
      .bar, .lead, h1, .noprint { display: none !important; }
      body { background: #fff; }
      .grid { grid-template-columns: repeat(3, 1fr); }
      .card { border: 1px dashed #bbb; break-inside: avoid; }
      .url { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📦 DepoZeka — Koli QR Üreteci</h1>
    <p class="lead">Her QR, telefonla okutulduğunda kolinin <b>içeriğini gösteren mobil sayfayı</b> açar. QR'ları yazdırıp kolilerin üzerine yapıştırın.</p>

    <div class="bar noprint">
      <button class="btn" onclick="window.print()">🖨️ Tümünü Yazdır</button>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <script src="data.js"></script>
  <script>
    var DEPO = window.DEPO;
    var BASE = "https://cetinkayafatih.github.io/depozeka-qr/";
    var grid = document.getElementById("grid");

    DEPO.kolis.forEach(function (k) {
      var tip = DEPO.tip[k.tip];
      var url = BASE + "urun.html?id=" + encodeURIComponent(k.barkod);
      var img = "img/url/" + encodeURIComponent(k.barkod) + ".png";
      var icerik = k.tip === "bitmis_urun" ? k.urun.ad : (k.kalemler.length + " çeşit malzeme · " + k.konum);

      var card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<img class="qr" src="' + img + '" alt="QR ' + k.barkod + '">' +
        '<div class="barkod">' + k.barkod + '</div>' +
        '<span class="tip" style="background:' + tip.renk + '">' + tip.kisa + '</span>' +
        '<div class="icerik">' + icerik + '</div>' +
        '<div class="actions noprint">' +
          '<a class="open" href="' + url + '" target="_blank" rel="noopener">Aç</a>' +
          '<a class="dl" href="' + img + '" download="' + k.barkod + '.png">PNG</a>' +
        '</div>' +
        '<div class="url">' + url + '</div>';
      grid.appendChild(card);
    });
  </script>
</body>
</html>
